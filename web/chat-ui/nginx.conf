# Serves the Vite build from /usr/share/nginx/html (Dockerfile COPY).
# SPA routing: unknown paths fall back to index.html for client-side routes.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
