# Postgres for local testing.
# Default user "chatbot" is superuser — use only for MIGRATION_DATABASE_URL / scripts/run_migrations.py.
# Runtime app should use DATABASE_URL=postgresql://chatbot_app:chatbot@... (created by migration 004).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot
    ports:
      - "5432:5432"
    volumes:
      - ${POSTGRES_DATA_PATH:-./postgres_data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 2s
      timeout: 5s
      retries: 10
